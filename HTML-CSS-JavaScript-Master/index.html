<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍂 JavaScript Master · fall colors</title>
    <!-- fun font from google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Yesteryear&display=swap"
        rel="stylesheet">
    <style>
        /* style.css content – integrated for single file, but clearly separated */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #fbf3e0;
            /* creamy base */
            color: #3d2b1a;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* fall color palette */
        :root {
            --brown-yellow: #c49a6c;
            /* warm suede */
            --mango-yellow: #f4d03f;
            /* juicy mango */
            --dark-red-brown: #8b3a3a;
            /* spiced cider */
            --rust: #b85e3a;
            /* autumn leaf */
            --cream: #fef7e6;
            --chocolate: #5c3b1c;
        }

        /* header & nav ================================= */
        header {
            background-color: var(--dark-red-brown);
            padding: 0.8rem 2rem;
            box-shadow: 0 6px 0 #632c2c, 0 8px 12px rgba(0, 0, 0, 0.2);
            border-bottom: 3px solid var(--mango-yellow);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo a {
            font-family: 'Yesteryear', cursive;
            font-size: 2.3rem;
            color: var(--mango-yellow);
            text-decoration: none;
            text-shadow: 3px 3px 0 #5e2c2c, 5px 5px 0 rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            background: var(--brown-yellow);
            border: none;
            padding: 0.6rem 1.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: #2f1d0e;
            border-radius: 40px 12px 40px 12px;
            cursor: pointer;
            box-shadow: 0 5px 0 #6b4d33, 0 6px 12px #3d2b1a66;
            transition: all 0.1s ease;
            font-family: 'Quicksand', sans-serif;
            border: 1px solid var(--mango-yellow);
        }

        .nav-btn:hover {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #6b4d33, 0 6px 12px #3d2b1a66;
            background: #e0b887;
        }

        .nav-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #6b4d33, 0 6px 12px #3d2b1a66;
        }

        /* main ======================================== */
        main {
            flex: 1;
            max-width: 1300px;
            margin: 2rem auto;
            padding: 0 2rem;
            width: 100%;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--dark-red-brown);
            text-shadow: 3px 3px 0 var(--mango-yellow);
            border-left: 12px solid var(--rust);
            padding-left: 1.5rem;
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
        }

        h2 {
            font-size: 2rem;
            margin: 2rem 0 1rem;
            background: linear-gradient(145deg, var(--brown-yellow), #e8c39e);
            display: inline-block;
            padding: 0.2rem 1.5rem 0.2rem 1rem;
            border-radius: 0 30px 0 30px;
            box-shadow: 5px 5px 0 var(--dark-red-brown);
            color: #2c1b0c;
        }

        h3 {
            font-size: 1.6rem;
            color: var(--rust);
            margin-top: 2rem;
            margin-bottom: 0.5rem;
            border-bottom: 3px dashed var(--mango-yellow);
        }

        h4 {
            font-size: 1.3rem;
            color: var(--chocolate);
            margin: 1.5rem 0 0.2rem;
        }

        /* chapter cards */
        .chapter-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .chapter-card {
            background: var(--cream);
            border: 4px solid var(--brown-yellow);
            border-radius: 40px 16px 40px 16px;
            padding: 1.8rem 2rem;
            box-shadow: 10px 10px 0 #602e2e30, 0 10px 20px #351d0d40;
        }

        .topic-block {
            background: #fff7e9;
            margin: 1.5rem 0;
            padding: 1.2rem 1.5rem;
            border-left: 10px solid var(--mango-yellow);
            border-radius: 20px 8px 20px 8px;
            box-shadow: inset 0 2px 6px #ffecd6;
        }

        .example-box,
        .qa-block {
            background: #eddbc4;
            padding: 1rem 1.5rem;
            border-radius: 24px 8px 24px 8px;
            margin: 1rem 0 0.5rem 0;
            border: 2px solid var(--rust);
        }

        .example-box pre {
            background: #2d2a1e;
            color: #f8ecc9;
            padding: 1rem;
            border-radius: 16px;
            font-family: 'Courier New', monospace;
            overflow-x: auto;
            border: 3px solid var(--brown-yellow);
        }

        .qa-block p {
            background: #faf1dc;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            margin: 0.5rem 0;
            font-weight: 600;
        }

        .quiz-area {
            background: #dbb58b;
            padding: 1.5rem 2rem;
            border-radius: 60px 16px 60px 16px;
            margin: 2rem 0 0;
            border: 3px solid var(--dark-red-brown);
            color: #281a0c;
        }

        .quiz-question {
            background: #fdefcf;
            padding: 1rem;
            border-radius: 40px;
            margin: 1rem 0;
        }

        .btn-quiz {
            background: var(--mango-yellow);
            border: 0;
            padding: 0.5rem 2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b3702a;
            transition: 0.1s ease;
            margin-right: 1rem;
            font-size: 1rem;
        }

        .btn-quiz:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .answer-feedback {
            margin-top: 0.8rem;
            font-size: 1.2rem;
        }

        /* footer ===================================== */
        footer {
            background: var(--chocolate);
            color: #f1dec0;
            text-align: center;
            padding: 1.5rem;
            border-top: 6px solid var(--mango-yellow);
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* active nav simulation */
        .nav-btn.active-tab {
            background: var(--mango-yellow);
            box-shadow: 0 5px 0 #a75929, 0 6px 12px black;
            border: 1px solid white;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo"><a href="#">JavaScript Master</a></div>
            <div class="nav-buttons">
                <button class="nav-btn" id="btnHtml">HTML</button>
                <button class="nav-btn" id="btnCss">CSS</button>
                <button class="nav-btn active-tab" id="btnJs">JavaScript</button>
            </div>
        </nav>
    </header>

    <main id="main-content">
        <!-- everything is generated by javascript (script.js) but we keep static fallback -->
        <h1>🍁 JavaScript: from fundamentals to beyond</h1>
        <div id="js-chapters-container" class="chapter-grid">
            <!-- dynamic injection from script.js -->
        </div>
    </main>

    <footer>
        <p>🍂 fall code · warm learning · JavaScript Master 🍂</p>
    </footer>

    <script>
        // ================= script.js =================
        // full interactive content generation + quiz logic

        (function () {
            // ----- complete topic data based on the outline -----
            const parts = [
                {
                    partName: 'Part 1: JavaScript Fundamentals',
                    chapters: [
                        {
                            title: 'Introduction', topics: [
                                { desc: 'JavaScript: history, role in web dev. Created in 1995 by Brendan Eich. Runs in browsers and Node.js.', example: '// your first JS\nconsole.log("Hello, autumn!");' }
                            ]
                        },
                        {
                            title: 'Syntax & Variables', topics: [
                                { desc: 'Statements, comments, let/const/var. let is block-scoped, const cannot be reassigned.', example: 'let season = "fall";\nconst COLOR = "brown";\nvar oldWay = "hoisted";' }
                            ]
                        },
                        {
                            title: 'Data Types', topics: [
                                { desc: 'Primitives: string, number, boolean, null, undefined, symbol, bigint. Dynamic typing.', example: 'let m = 42;\nlet n = "42";\nlet isWarm = true;' }
                            ]
                        },
                        {
                            title: 'Operators', topics: [
                                { desc: 'Arithmetic, comparison, logical, ternary. Coercion: "5" - 2 = 3', example: 'let total = 10 + 5; // 15\nlet compare = 7 > 3; // true' }
                            ]
                        },
                        {
                            title: 'Control Flow', topics: [
                                { desc: 'if/else, switch. Conditional execution.', example: 'if (season === "fall") {\n  console.log("🍂");\n}' }
                            ]
                        },
                        {
                            title: 'Loops', topics: [
                                { desc: 'for, while, do...while, break/continue.', example: 'for (let i=0; i<3; i++) {\n  console.log("leaf");\n}' }
                            ]
                        }
                    ]
                },
                {
                    partName: 'Part 2: Core Concepts & Data Structures',
                    chapters: [
                        {
                            title: 'Functions', topics: [
                                { desc: 'declarations, expressions, arrow functions. Default parameters.', example: 'const add = (a,b=2) => a+b;' }
                            ]
                        },
                        {
                            title: 'Scope & Hoisting', topics: [
                                { desc: 'global, function, block scope. var hoisting, let/const not initialized.', example: 'console.log(x); // undefined (var x)\nvar x=5;' }
                            ]
                        },
                        {
                            title: 'Arrays', topics: [
                                { desc: 'push, pop, map, filter, reduce. Powerful methods.', example: '[1,2,3].map(n => n*2); // [2,4,6]' }
                            ]
                        },
                        {
                            title: 'Objects', topics: [
                                { desc: 'literal, constructor, properties, methods, "this".', example: 'const bike = {type:"mountain", sound:"whoosh"};' }
                            ]
                        },
                        {
                            title: 'Strings & Numbers', topics: [
                                { desc: 'methods like .toUpperCase(), .toFixed()', example: '"hello".length; // 5' }
                            ]
                        },
                        {
                            title: 'Template Literals', topics: [
                                { desc: 'backticks, interpolation, multiline.', example: '`🍁 fall ${2024}`' }
                            ]
                        }
                    ]
                },
                {
                    partName: 'Part 3: Intermediate & Advanced',
                    chapters: [
                        {
                            title: 'Closures', topics: [
                                { desc: 'inner function remembers outer scope.', example: 'function outer(x){\n  return function(){ return x; }\n}' }
                            ]
                        },
                        {
                            title: 'OOP (prototypes & classes)', topics: [
                                { desc: 'prototypal inheritance, ES6 classes.', example: 'class Tree { constructor(type){ this.type = type; } }' }
                            ]
                        },
                        {
                            title: 'Functional Programming', topics: [
                                { desc: 'higher‑order, pure functions, map/filter/reduce.', example: 'const add1 = n => n+1;' }
                            ]
                        }
                    ]
                },
                {
                    partName: 'Part 4: Asynchronous & Browser APIs',
                    chapters: [
                        {
                            title: 'Synchronous vs Asynchronous', topics: [
                                { desc: 'call stack, event loop, callback queue.', example: 'setTimeout(()=>{},1000)' }
                            ]
                        },
                        {
                            title: 'Callbacks', topics: [
                                { desc: 'function as argument, callback hell.', example: 'loadData(()=>{ render(); });' }
                            ]
                        },
                        {
                            title: 'Promises', topics: [
                                { desc: 'then, catch, finally. Promise.all', example: 'fetch(url).then(res=>res.json())' }
                            ]
                        },
                        {
                            title: 'Async/Await', topics: [
                                { desc: 'syntactic sugar over promises.', example: 'async function getData(){ await fetch... }' }
                            ]
                        },
                        {
                            title: 'DOM Manipulation', topics: [
                                { desc: 'select, modify, create elements.', example: 'document.querySelector("h1")' }
                            ]
                        },
                        {
                            title: 'Browser Events', topics: [
                                { desc: 'addEventListener, propagation.', example: 'btn.addEventListener("click", handler)' }
                            ]
                        },
                        {
                            title: 'Web APIs (Fetch, Storage)', topics: [
                                { desc: 'localStorage, sessionStorage, timers.', example: 'localStorage.setItem("key","val")' }
                            ]
                        }
                    ]
                },
                {
                    partName: 'Part 5: Ecosystem & Beyond',
                    chapters: [
                        {
                            title: 'JSON', topics: [
                                { desc: 'parse, stringify.', example: 'JSON.stringify({js:"master"})' }
                            ]
                        },
                        {
                            title: 'Package managers', topics: [
                                { desc: 'npm / yarn – manage dependencies.' }
                            ]
                        },
                        {
                            title: 'Module bundlers', topics: [
                                { desc: 'Webpack, Vite, Babel.' }
                            ]
                        }
                    ]
                }
            ];

            const container = document.getElementById('js-chapters-container');
            if (!container) return;

            let htmlString = '';

            parts.forEach(part => {
                htmlString += `<h2>${part.partName}</h2>`;
                part.chapters.forEach(ch => {
                    htmlString += `<div class="chapter-card">`;
                    htmlString += `<h3>📘 ${ch.title}</h3>`;

                    ch.topics.forEach(topic => {
                        htmlString += `<div class="topic-block">`;
                        htmlString += `<p><strong>📖 explanation:</strong> ${topic.desc}</p>`;
                        if (topic.example) {
                            htmlString += `<div class="example-box"><pre>${topic.example.replace(/</g, '&lt;')}</pre></div>`;
                        }
                        // Q&A block (static demo)
                        htmlString += `<div class="qa-block"><p><strong>❓ Q:</strong> What concept does this topic highlight?</p>`;
                        htmlString += `<p><strong>✅ A:</strong> It highlights core "${ch.title}" mechanics.</p></div>`;
                        htmlString += `</div>`; // close topic-block
                    });

                    // QUIZ section after each chapter
                    htmlString += `<div class="quiz-area" id="quiz-${ch.title.replace(/\s+/g, '')}">`;
                    htmlString += `<h4>🍂 chapter quiz: ${ch.title}</h4>`;
                    htmlString += `<div class="quiz-question">`;
                    htmlString += `<p>🤔 Which best describes a feature of ${ch.title}?</p>`;
                    htmlString += `<button class="btn-quiz" data-ans="correct">A) the correct core concept</button>`;
                    htmlString += `<button class="btn-quiz" data-ans="wrong">B) unrelated idea</button>`;
                    htmlString += `<button class="btn-quiz" data-ans="wrong">C) silly fall leaf</button>`;
                    htmlString += `<div class="answer-feedback" style="min-height:2rem;"></div>`;
                    htmlString += `</div></div>`;

                    htmlString += `</div>`; // close chapter-card
                });
            });

            container.innerHTML = htmlString;

            // ----- attach quiz interactive logic (fall color feedback) -----
            const allQuizButtons = document.querySelectorAll('.btn-quiz');
            allQuizButtons.forEach(btn => {
                btn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    const answer = this.getAttribute('data-ans');
                    const feedbackDiv = this.parentElement.querySelector('.answer-feedback');
                    if (!feedbackDiv) return;
                    if (answer === 'correct') {
                        feedbackDiv.innerHTML = '🎃 <span style="background:var(--mango-yellow); padding:0.3rem 1rem; border-radius:30px;">✔ perfect! That’s right. (+🍁)</span>';
                        feedbackDiv.style.color = '#1f4f1f';
                    } else {
                        feedbackDiv.innerHTML = '🌰 <span style="background:#d49c6c; padding:0.3rem 1rem; border-radius:30px;">✘ not quite. try again! but enjoy the fall.</span>';
                        feedbackDiv.style.color = '#8b3a3a';
                    }
                });
            });

            // ----- nav buttons simulation (just for fun) -----
            document.getElementById('btnHtml')?.addEventListener('click', () => {
                alert('🍂 HTML section: would show fall‑themed html tutorials (mock). Enjoy the colors!');
            });
            document.getElementById('btnCss')?.addEventListener('click', () => {
                alert('🍁 CSS part: fall styling tricks – but currently showing JavaScript master.');
            });
            document.getElementById('btnJs')?.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        })();
    </script>
</body>

</html>
