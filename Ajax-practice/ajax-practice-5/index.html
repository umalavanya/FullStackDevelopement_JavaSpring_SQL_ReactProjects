<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form | Corrected</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(145deg, #0b5e7c 0%, #0a3b44 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 16px;
        }

        .form-container {
            background: linear-gradient(135deg, #1e6b2f 0%, #7d5d3c 100%);
            width: 100%;
            max-width: 420px;
            height: fit-content;
            padding: 28px 24px 32px 24px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.35);
            transition: all 0.2s ease;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            color: white;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group label::before {
            content: "▸";
            font-size: 0.75rem;
            color: #ffec9f;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 60px;
            background-color: rgba(255, 255, 255, 0.92);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
            color: #1e2a1f;
            font-weight: 500;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05), 0 1px 1px rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            background-color: white;
            box-shadow: 0 0 0 3px rgba(255, 236, 159, 0.6);
            transform: scale(1.01);
        }

        .form-group input::placeholder {
            color: #7c6b4b;
            font-weight: 400;
            font-size: 0.9rem;
        }

        /* button styling */
        #btn-submit {
            background-color: #f5c542;
            border: none;
            padding: 12px 18px;
            border-radius: 60px;
            font-size: 1.05rem;
            font-weight: bold;
            color: #2c4b1e;
            font-family: inherit;
            margin-top: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            letter-spacing: 0.8px;
        }

        #btn-submit:hover {
            background-color: #ffda6a;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
        }

        #btn-submit:active {
            transform: translateY(1px);
        }

        /* small additional style for consistency */
        .form-group:last-of-type {
            margin-bottom: 0;
        }

        /* responsive touch */
        @media (max-width: 480px) {
            .form-container {
                padding: 20px 18px 26px 18px;
                gap: 16px;
            }

            .form-group input {
                padding: 10px 14px;
            }
        }

        /* live validation hint (just for extra polish) */
        .error-hint {
            font-size: 0.7rem;
            color: #ffd966;
            margin-top: 2px;
            margin-left: 12px;
            display: none;
        }

        .form-group.invalid .error-hint {
            display: block;
        }

        .form-group.invalid input {
            border: 2px solid #ffb347;
            background-color: #fff5e6;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <!-- USERNAME group: corrected 'for' attribute + distinct id for input & label -->
        <div class="form-group" id="username-group">
            <label for="username-input">User Name</label>
            <input type="text" id="username-input" placeholder="e.g., john_doe" name="username" autocomplete="username">
            <span class="error-hint">Username must be at least 3 characters</span>
        </div>

        <!-- EMAIL group: fixed input type and label relationship -->
        <div class="form-group" id="email-group">
            <label for="email-input">Email</label>
            <input type="email" id="email-input" placeholder="hello@example.com" name="email" autocomplete="email">
            <span class="error-hint">Enter a valid email address</span>
        </div>

        <!-- PASSWORD group: type="password" instead of text, better id handling -->
        <div class="form-group" id="password-group">
            <label for="password-input">Password</label>
            <input type="password" id="password-input" placeholder="••••••••" name="password"
                autocomplete="new-password">
            <span class="error-hint">Password must be at least 6 characters</span>
        </div>

        <button id="btn-submit">✓ Submit</button>
    </div>

    <!-- small interactive validation for better UX (corrects placeholder behavior + realtime feedback) -->
    <script>
        (function () {
            // Get all required elements
            const usernameInput = document.getElementById('username-input');
            const emailInput = document.getElementById('email-input');
            const passwordInput = document.getElementById('password-input');
            const submitBtn = document.getElementById('btn-submit');

            const usernameGroup = document.getElementById('username-group');
            const emailGroup = document.getElementById('email-group');
            const passwordGroup = document.getElementById('password-group');

            // Helper to show/hide error state
            function setInvalid(elementGroup, isInvalid) {
                if (isInvalid) {
                    elementGroup.classList.add('invalid');
                } else {
                    elementGroup.classList.remove('invalid');
                }
            }

            // Real-time validation functions
            function validateUsername() {
                const username = usernameInput.value.trim();
                const isValid = username.length >= 3;
                setInvalid(usernameGroup, !isValid);
                return isValid;
            }

            function validateEmail() {
                const email = emailInput.value.trim();
                // Basic but solid email regex (covers most common cases)
                const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                const isValid = email !== '' && emailRegex.test(email);
                setInvalid(emailGroup, !isValid);
                return isValid;
            }

            function validatePassword() {
                const password = passwordInput.value;
                const isValid = password.length >= 6;
                setInvalid(passwordGroup, !isValid);
                return isValid;
            }

            // full validation for all fields (returns true if all valid)
            function validateAllFields() {
                const isUsernameValid = validateUsername();
                const isEmailValid = validateEmail();
                const isPasswordValid = validatePassword();
                return isUsernameValid && isEmailValid && isPasswordValid;
            }

            // attach event listeners for live feedback
            usernameInput.addEventListener('input', function () {
                validateUsername();
            });

            emailInput.addEventListener('input', function () {
                validateEmail();
            });

            passwordInput.addEventListener('input', function () {
                validatePassword();
            });

            // submit action with proper validation + user alert / feedback
            submitBtn.addEventListener('click', function (event) {
                // re-run all validations to ensure UI shows any errors
                const isValid = validateAllFields();

                if (!isValid) {
                    // show a subtle but clear message
                    const errorMessage = document.querySelector('.form-container .error-general');
                    if (!errorMessage) {
                        const generalError = document.createElement('div');
                        generalError.className = 'error-general';
                        generalError.style.backgroundColor = 'rgba(220, 60, 50, 0.9)';
                        generalError.style.color = 'white';
                        generalError.style.padding = '10px 16px';
                        generalError.style.borderRadius = '60px';
                        generalError.style.fontSize = '0.85rem';
                        generalError.style.textAlign = 'center';
                        generalError.style.fontWeight = 'bold';
                        generalError.innerText = 'Please fix the errors above before submitting.';
                        generalError.style.marginTop = '0px';
                        // insert before submit button
                        submitBtn.parentNode.insertBefore(generalError, submitBtn);
                        setTimeout(() => {
                            if (generalError && generalError.parentNode) generalError.remove();
                        }, 2800);
                    }
                    // also scroll to first invalid field
                    const firstInvalid = document.querySelector('.form-group.invalid');
                    if (firstInvalid) {
                        firstInvalid.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        const input = firstInvalid.querySelector('input');
                        if (input) input.focus();
                    }
                    return;
                }

                // if all fields are valid, show success message + console log (prevent default page reload for demo)
                event.preventDefault ? event.preventDefault() : (window.event.returnValue = false);

                // build data object for demo purposes
                const formData = {
                    username: usernameInput.value.trim(),
                    email: emailInput.value.trim(),
                    password: passwordInput.value   // In real app, never log plain password, but for demo it's ok inside local sandbox
                };

                // Visual success feedback
                const existingSuccess = document.querySelector('.form-container .success-message');
                if (existingSuccess) existingSuccess.remove();

                const successDiv = document.createElement('div');
                successDiv.className = 'success-message';
                successDiv.style.backgroundColor = '#2e7d32';
                successDiv.style.color = 'white';
                successDiv.style.padding = '12px 16px';
                successDiv.style.borderRadius = '40px';
                successDiv.style.fontSize = '0.9rem';
                successDiv.style.textAlign = 'center';
                successDiv.style.fontWeight = 'bold';
                successDiv.style.marginTop = '0px';
                successDiv.style.boxShadow = '0 2px 8px rgba(0,0,0,0.2)';
                successDiv.innerHTML = '✅ Registration successful! Welcome ' + escapeHtml(formData.username) + ' 🎉';
                submitBtn.parentNode.insertBefore(successDiv, submitBtn.nextSibling);

                // remove success after 3 sec
                setTimeout(() => {
                    if (successDiv && successDiv.parentNode) successDiv.remove();
                }, 3300);

                // Also log clean data (without page reload to preserve demo)
                console.clear();
                console.log('Form submitted successfully:', {
                    username: formData.username,
                    email: formData.email,
                    password: '[HIDDEN]'
                });

                // OPTIONAL: reset form if desired (not resetting by default, but could)
                // usernameInput.value = ''; emailInput.value = ''; passwordInput.value = '';
                // remove invalid classes after success? keep but after reset we can just clear errors
                // we'll keep it simple but demonstrate complete fix
            });

            // helper to avoid XSS in success message
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function (m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function (c) {
                    return c;
                });
            }

            // Prevent actual form POST if someone tries to press enter inside inputs?
            const formContainer = document.querySelector('.form-container');
            formContainer.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    submitBtn.click();
                }
            });

            // initial validation state? not necessary but set default classes clean (no errors)
            // remove any pre-invalid states on load
            setInvalid(usernameGroup, false);
            setInvalid(emailGroup, false);
            setInvalid(passwordGroup, false);

            // Also fix missing 'name' attribute in email and password field was already set, but ensure
            // username-input name="username", email-input name="email", password-input name="password" is correct
            // Fix labels: The original had duplicate 'id' and 'for' issues, completely solved.
            // Additionally: In original the email input had no type=email and no placeholder
            // and password input type was text, corrected.

            // Extra improvement: ensure all labels point to correct input IDs
            // already fixed via html structure.

            // Add small edge case: live demo shows that password field is masked.
            // Also corrected background contrast, form accessibility.
        })();
    </script>

    <!-- Explanation of corrections:
     1. Fixed label 'for' attributes to match actual input ids (username-input, email-input, password-input).
     2. Changed second input (email) type from text to "email" and added placeholder + correct name.
     3. Changed third input (password) type from text to "password" to hide input.
     4. Removed duplicate IDs: each element now has unique id. (Previously username label had id="username" and input had same id conflict)
     5. Added proper autocomplete attributes for modern browsers.
     6. Added real-time validation with visual hints (improves UX, corrects placeholder ambiguity).
     7. Added submit handler with actual validation and success/error messages.
     8. Improved responsive design and spacing, fixed gradient and background contrast.
     9. Prevent accidental page reload or default form behavior, added Enter key support.
    10. The original missing placeholder for email, empty input behavior resolved.
    11. Also improved overall semantic HTML and accessibility.
-->
</body>

</html>
