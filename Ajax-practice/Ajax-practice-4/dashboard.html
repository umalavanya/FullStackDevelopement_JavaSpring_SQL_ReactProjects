<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="dashboard-container">
            <div class="dashboard-header">
                <h2>Welcome, <span id="userName"></span>!</h2>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
            <div class="dashboard-content">
                <div class="user-info">
                    <h3>Your Profile Information</h3>
                    <p><strong>Username:</strong> <span id="dashboardUsername"></span></p>
                    <p><strong>Email:</strong> <span id="dashboardEmail"></span></p>
                    <p><strong>Full Name:</strong> <span id="dashboardFullname"></span></p>
                    <p><strong>Member Since:</strong> <span id="memberSince"></span></p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
