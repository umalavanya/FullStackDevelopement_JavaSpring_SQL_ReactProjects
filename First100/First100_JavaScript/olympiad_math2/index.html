<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Grade‑2 Math Olympiad · Play & Learn</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="game-container">
        <div class="header">
            <h1>
                <span>🏅</span> OLYMPIAD <span>GRADE 2</span>
            </h1>
            <div class="score-box" id="scoreDisplay">0</div>
        </div>

        <!-- question area -->
        <div class="question-card">
            <div class="question-text" id="questionText">Loading ...</div>
            <div class="options-grid" id="optionsContainer"></div>
        </div>

        <!-- bottom buttons & hint -->
        <div class="action-panel">
            <div class="hint-box" id="hintMessage">✨ click an answer</div>
            <button class="next-btn" id="nextButton">➡️ NEXT</button>
        </div>
        <div class="footer-mascot">
            🐘🐘 math olympiad fun 🐘🐘
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
