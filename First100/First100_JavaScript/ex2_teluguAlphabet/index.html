<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telugu aksharamala for kids</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #f9eecd 0%, #fef9e7 100%);
            font-family: 'Segoe UI', 'Nirmala UI', 'Gautami', 'Noto Sans Telugu', 'Arial Unicode MS', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 251, 240, 0.9);
            backdrop-filter: blur(6px);
            border-radius: 56px 56px 48px 48px;
            box-shadow: 0 25px 40px -10px rgba(140, 80, 20, 0.3), 0 8px 15px rgba(0, 0, 0, 0.1);
            padding: 30px 25px 40px 25px;
            border: 3px solid #ffcf9a;
        }

        h1 {
            font-size: 2.7rem;
            text-align: center;
            color: #b45f2b;
            text-shadow: 3px 3px 0 #ffe2b5;
            letter-spacing: 2px;
            word-break: break-word;
            margin-top: 5px;
            margin-bottom: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 span {
            background: #ffb882;
            color: #4b2e1a;
            font-size: 1.8rem;
            padding: 0.25rem 1.2rem;
            border-radius: 60px;
            border: 3px solid #f5873b;
            box-shadow: inset 0 -3px 0 #b15410;
            font-weight: 600;
        }

        .sub {
            text-align: center;
            font-size: 1.5rem;
            margin: 0 0 20px 0;
            color: #aa5e2b;
            background: #ffdbb5;
            display: inline-block;
            padding: 0.3rem 2rem;
            border-radius: 50px;
            margin-left: auto;
            margin-right: auto;
            width: fit-content;
            border: 2px dashed #d98f4a;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(95px, 1fr));
            gap: 16px 12px;
            margin: 35px 0 25px 0;
        }

        .alphabet-card {
            background: #fffbf2;
            border-radius: 30px 20px 30px 20px;
            box-shadow: 0 8px 0 #b27d4a, 0 12px 18px -8px #87613b;
            border: 2px solid #eb9f5e;
            text-align: center;
            padding: 16px 5px 10px 5px;
            transition: transform 0.1s ease, box-shadow 0.15s ease;
            cursor: pointer;
        }

        .alphabet-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 0 #b27d4a, 0 18px 22px -8px #7b4f2b;
        }

        .alphabet-card:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #b27d4a, 0 10px 15px -5px #7b4f2b;
        }

        .telugu-char {
            font-size: 3.7rem;
            line-height: 1.2;
            font-weight: 600;
            color: #512e14;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0 #fbc48b;
        }

        .translit {
            font-size: 1.2rem;
            background: #fdebd0;
            padding: 6px 0 4px 0;
            border-radius: 40px;
            width: 85%;
            margin: 5px auto 0 auto;
            color: #824e25;
            font-weight: 600;
            border: 1px solid #edb16c;
            text-transform: lowercase;
        }

        .info-panel {
            background: #ffeacc;
            border-radius: 50px 50px 30px 30px;
            padding: 18px 25px;
            margin: 15px 0 10px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            border: 3px solid #fba76f;
        }

        .info-panel p {
            font-size: 2rem;
            font-weight: 500;
        }

        .info-panel p strong {
            background: #b45f2b;
            color: white;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 2rem;
            margin-left: 12px;
            border: 2px solid #482718;
        }

        .speaker-btn {
            background: #f08534;
            border: none;
            color: white;
            font-size: 2rem;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 7px 0 #9e541f, 0 8px 16px #c9742e;
            transition: 0.05s linear;
            border: 2px solid #febb7e;
        }

        .speaker-btn:active {
            box-shadow: 0 2px 0 #9e541f;
            transform: translateY(5px);
        }

        .speaker-btn span {
            font-size: 1.9rem;
        }

        footer {
            text-align: center;
            margin-top: 25px;
            font-size: 1.3rem;
            color: #a5652b;
        }

        .bandi-highlight {
            background: #ffe05c;
            border-radius: 30px;
            outline: 3px solid #f7903d;
        }

        /* fallback for older telugu fonts */
        @font-face {
            font-family: 'Nirmala UI';
            src: local('Nirmala UI'), local('Gautami'), local('Noto Sans Telugu'), local('Lohit Telugu'), local('Telugu Sangam MN');
            font-weight: normal;
            font-style: normal;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>
            🌸 తెలుగు అక్షరమాల 🌸
            <span>kids</span>
        </h1>
        <div class="sub"> అ నుండి క్ష మరియు బండి ర </div>

        <!-- dynamic grid will be injected by js -->
        <div id="alphabetGrid" class="grid-container"></div>

        <!-- info & pronunciation helper -->
        <div class="info-panel">
            <p>
                <span id="selectedDisplay">🪷 క్ష</span>
                <strong id="selectedRoman">kSha</strong>
            </p>
            <button class="speaker-btn" id="speakBtn">
                <span>🔊</span> వినండి
            </button>
        </div>

        <footer>
            👆 ఏ అక్షరం మీద నొక్కండి – పేరు వినండి | బండి ర (bandi ra) కూడా ఉంది!
        </footer>
    </div>

    <script>
        (function () {
            // ----- Telugu data: from అ to క్ష, and బండి ర (special)
            const letters = [
                { telugu: "అ", roman: "a" },
                { telugu: "ఆ", roman: "aa" },
                { telugu: "ఇ", roman: "i" },
                { telugu: "ఈ", roman: "ee" },
                { telugu: "ఉ", roman: "u" },
                { telugu: "ఊ", roman: "oo" },
                { telugu: "ఋ", roman: "ru" },
                { telugu: "ౠ", roman: "roo" },
                { telugu: "ఎ", roman: "e" },
                { telugu: "ఏ", roman: "ae" },
                { telugu: "ఐ", roman: "ai" },
                { telugu: "ఒ", roman: "o" },
                { telugu: "ఓ", roman: "oa" },
                { telugu: "ఔ", roman: "au" },
                { telugu: "అం", roman: "am" },
                { telugu: "అః", roman: "aha" },
                { telugu: "క", roman: "ka" },
                { telugu: "ఖ", roman: "kha" },
                { telugu: "గ", roman: "ga" },
                { telugu: "ఘ", roman: "gha" },
                { telugu: "ఙ", roman: "nga" },
                { telugu: "చ", roman: "cha" },
                { telugu: "ఛ", roman: "chha" },
                { telugu: "జ", roman: "ja" },
                { telugu: "ఝ", roman: "jha" },
                { telugu: "ఞ", roman: "nya" },
                { telugu: "ట", roman: "ta" },
                { telugu: "ఠ", roman: "tha" },
                { telugu: "డ", roman: "da" },
                { telugu: "ఢ", roman: "dha" },
                { telugu: "ణ", roman: "Na" },
                { telugu: "త", roman: "tha" },
                { telugu: "థ", roman: "thha" },
                { telugu: "ద", roman: "da" },
                { telugu: "ధ", roman: "dha" },
                { telugu: "న", roman: "na" },
                { telugu: "ప", roman: "pa" },
                { telugu: "ఫ", roman: "pha" },
                { telugu: "బ", roman: "ba" },
                { telugu: "భ", roman: "bha" },
                { telugu: "మ", roman: "ma" },
                { telugu: "య", roman: "ya" },
                { telugu: "ర", roman: "ra" },
                { telugu: "ల", roman: "la" },
                { telugu: "వ", roman: "va" },
                { telugu: "శ", roman: "sha" },
                { telugu: "ష", roman: "Sha" },
                { telugu: "స", roman: "sa" },
                { telugu: "హ", roman: "ha" },
                { telugu: "ళ", roman: "La" },
                { telugu: "క్ష", roman: "kSha" },
                // BANDI RA (special) –  బండి ర  (usual representation: "ర" with different glyph, but we include as special)
                { telugu: "ర", roman: "bandi ra", isBandi: true }   // will visually mark
            ];

            // we want exactly "bandi ra" but in the grid we show same 'ర'? but we want to distinguish.
            // actually the request: "letters from A to ksha and bandi ra". so we keep 'ర' as normal and add an explicit bandi ra card.
            // to avoid duplicate 'ర' (normal ra), we replace the last entry with a distinct card: bandi ra often looks like "ర" with a different pull, but visually we can mark it.
            // better: keep all regulars, and append an extra card for bandi ra with a special symbol or mark.
            // I'll modify: remove the duplicate 'ర' above and add explicit bandi ra card at end with same character but special label.

            // rebuild letters array with normal ra only once, then add bandi ra as separate card.
            const baseLetters = [
                { telugu: "అ", roman: "a" }, { telugu: "ఆ", roman: "aa" }, { telugu: "ఇ", roman: "i" }, { telugu: "ఈ", roman: "ee" },
                { telugu: "ఉ", roman: "u" }, { telugu: "ఊ", roman: "oo" }, { telugu: "ఋ", roman: "ru" }, { telugu: "ౠ", roman: "roo" },
                { telugu: "ఎ", roman: "e" }, { telugu: "ఏ", roman: "ae" }, { telugu: "ఐ", roman: "ai" }, { telugu: "ఒ", roman: "o" },
                { telugu: "ఓ", roman: "oa" }, { telugu: "ఔ", roman: "au" }, { telugu: "అం", roman: "am" }, { telugu: "అః", roman: "aha" },
                { telugu: "క", roman: "ka" }, { telugu: "ఖ", roman: "kha" }, { telugu: "గ", roman: "ga" }, { telugu: "ఘ", roman: "gha" },
                { telugu: "ఙ", roman: "nga" }, { telugu: "చ", roman: "cha" }, { telugu: "ఛ", roman: "chha" }, { telugu: "జ", roman: "ja" },
                { telugu: "ఝ", roman: "jha" }, { telugu: "ఞ", roman: "nya" }, { telugu: "ట", roman: "ta" }, { telugu: "ఠ", roman: "tha" },
                { telugu: "డ", roman: "da" }, { telugu: "ఢ", roman: "dha" }, { telugu: "ణ", roman: "Na" }, { telugu: "త", roman: "tha" },
                { telugu: "థ", roman: "thha" }, { telugu: "ద", roman: "da" }, { telugu: "ధ", roman: "dha" }, { telugu: "న", roman: "na" },
                { telugu: "ప", roman: "pa" }, { telugu: "ఫ", roman: "pha" }, { telugu: "బ", roman: "ba" }, { telugu: "భ", roman: "bha" },
                { telugu: "మ", roman: "ma" }, { telugu: "య", roman: "ya" }, { telugu: "ర", roman: "ra" },   // normal ra
                { telugu: "ల", roman: "la" }, { telugu: "వ", roman: "va" }, { telugu: "శ", roman: "sha" }, { telugu: "ష", roman: "Sha" },
                { telugu: "స", roman: "sa" }, { telugu: "హ", roman: "ha" }, { telugu: "ళ", roman: "La" }, { telugu: "క్ష", roman: "kSha" }
            ];

            // add Bandi Ra card (special)
            const bandiRa = { telugu: "ర", roman: "bandi ra", isBandi: true };

            const allLetters = [...baseLetters, bandiRa];

            // reference for DOM
            const gridEl = document.getElementById('alphabetGrid');
            const selectedDisplay = document.getElementById('selectedDisplay');
            const selectedRoman = document.getElementById('selectedRoman');
            const speakBtn = document.getElementById('speakBtn');

            // current active letter
            let currentTelugu = "క్ష";
            let currentRoman = "kSha";

            // --- render grid
            function renderGrid() {
                gridEl.innerHTML = '';
                allLetters.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'alphabet-card';
                    if (item.isBandi) {
                        card.classList.add('bandi-highlight');   // special border for bandi ra
                    }

                    // char div
                    const charDiv = document.createElement('div');
                    charDiv.className = 'telugu-char';
                    charDiv.textContent = item.telugu;
                    // translit div
                    const romanDiv = document.createElement('div');
                    romanDiv.className = 'translit';
                    romanDiv.textContent = item.roman;

                    card.appendChild(charDiv);
                    card.appendChild(romanDiv);

                    // attach click
                    card.addEventListener('click', (e) => {
                        e.stopPropagation();
                        // update current
                        currentTelugu = item.telugu;
                        currentRoman = item.roman;
                        selectedDisplay.textContent = `🪷 ${item.telugu}`;
                        selectedRoman.textContent = item.roman;
                        // optional: read automatically? we leave to button
                    });

                    // double click also speak? kids might like, but we keep separate button, but also provide speak on single click? i will add speak on single click for easy (optional)
                    // but many kids like to hear when they click. Let's make single click both select AND speak (easier)
                    // However we already have speak button, but better to make click also speak (friendly). 
                    // i'll add speech in single click, but prevent overlap with button. 
                    card.addEventListener('click', (e) => {
                        e.stopPropagation();
                        currentTelugu = item.telugu;
                        currentRoman = item.roman;
                        selectedDisplay.textContent = `🪷 ${item.telugu}`;
                        selectedRoman.textContent = item.roman;
                        // auto speak (kids friendly)
                        speakText(item.telugu, item.roman);
                    });

                    gridEl.appendChild(card);
                });
            }

            // Speech function (uses Web Speech API)
            function speakText(teluguChar, romanName) {
                if (!window.speechSynthesis) {
                    alert("Sorry, your browser doesn't support text-to-speech. Please use Chrome, Edge, or Safari.");
                    return;
                }
                // cancel any ongoing speech
                window.speechSynthesis.cancel();

                // We'll create two utterances: one for Telugu character, then the roman name to help
                const utterance1 = new SpeechSynthesisUtterance(teluguChar);
                utterance1.lang = 'te-IN';  // Telugu (India)
                utterance1.rate = 0.9;
                utterance1.pitch = 1.2;

                const utterance2 = new SpeechSynthesisUtterance(romanName);
                utterance2.lang = 'en-US'; // say the roman name in English
                utterance2.rate = 0.8;
                utterance2.pitch = 1.0;

                // try to pick Telugu voice if available
                const voices = window.speechSynthesis.getVoices();
                // sometimes voices aren't loaded yet; we set lang and let browser decide.
                // but we can attempt to set a telugu voice if already loaded.
                const teluguVoice = voices.find(v => v.lang.includes('te') || v.lang.includes('telugu'));
                if (teluguVoice) {
                    utterance1.voice = teluguVoice;
                }

                utterance1.onend = function () {
                    // after telugu, speak the roman description
                    window.speechSynthesis.speak(utterance2);
                };

                // speak first
                window.speechSynthesis.speak(utterance1);
            }

            // speak button calls current selected
            function speakCurrent() {
                if (currentTelugu && currentRoman) {
                    speakText(currentTelugu, currentRoman);
                }
            }

            // initialize default selected (క్ష)
            function setDefaultSelected() {
                // find kSha
                const kshaItem = allLetters.find(l => l.roman === 'kSha');
                if (kshaItem) {
                    currentTelugu = kshaItem.telugu;
                    currentRoman = kshaItem.roman;
                    selectedDisplay.textContent = `🪷 ${kshaItem.telugu}`;
                    selectedRoman.textContent = kshaItem.roman;
                } else {
                    // fallback
                    currentTelugu = "క్ష";
                    currentRoman = "kSha";
                    selectedDisplay.textContent = `🪷 క్ష`;
                    selectedRoman.textContent = "kSha";
                }
            }

            // voice load (some browsers need to wait)
            window.speechSynthesis?.getVoices(); // preload

            // start
            renderGrid();
            setDefaultSelected();

            // add event to speak button
            speakBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                speakCurrent();
            });

            // also make the panel click speak? optional. but we keep button.

            // Handle voices async (chrome)
            if (window.speechSynthesis) {
                window.speechSynthesis.onvoiceschanged = function () {
                    // just in case, we can re-set nothing, but ensure future speak works.
                };
            }

            // add a small touch: if any card with bandi ra, add extra highlight style
        })();
    </script>

    <!-- additional fallback for very old browsers: show message -->
    <noscript>
        <div style="color:red; padding:2rem;">JavaScript enabled required for interactive learning.</div>
    </noscript>
</body>

</html>
