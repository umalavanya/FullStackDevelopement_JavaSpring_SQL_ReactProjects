<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator-Uma Practice</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="calculator">
        <!-- tiny top line: just style -->
         <div class="brand-line">
            <span>M+ M-</span>
            <span>MRC</span>
         </div>

         <div class="display">
            <div class="small-mem">MEMORY</div>
            <div class="main-number">2</div>
         </div>

         <!-- key grid, arranged exactly as the given layout:
          7 8 9 x
          4 5 6 -
          1 2 3 + 
          CE 0 = ÷ -->

          <div class="keys">
            <div class="key key-row1-col1">7</div>
            <div class="key key-row1-col2">8</div>
            <div class="key key-row1-col3">9</div>
            <div class="key operator key-row1-col4">X</div>

            <div class="key key-row2-col1">4</div>
            <div class="key key-row2-col2">5</div>
            <div class="key key-row2-col3">6</div>
            <div class="key operator key-row2-col4">-</div>

            <div class="key key-row3-col1">1</div>
            <div class="key key-row3-col2">2</div>
            <div class="key key-row3-col3">3</div>
            <div class="key operator key-row3-col4">+</div>

            <div class="key ce key-row4-col1">CE</div>
            <div class="key key-row4-col2">0</div>
            <div class="key equal key-row4-col3">=</div>
            <div class="key operator key-row4-col4">÷</div>
          </div>

          <!-- small description (not part of calc) -->
           <div>
            design based on given layout
           </div>



    </div>




    <script src="script.js"></script>
</body>
</html>
