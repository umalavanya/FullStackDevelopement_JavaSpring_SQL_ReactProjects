<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nebula Drift | Cosmic Serenity</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            /* prevent accidental text selection on animations */
        }

        body {
            min-height: 100vh;
            background: #0a0718;
            /* deep fallback */
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', 'Montserrat', system-ui, -apple-system, 'Inter', sans-serif;
        }

        /* main canvas container */
        .canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* theme title + subtle overlay content */
        .theme-overlay {
            position: absolute;
            bottom: 8%;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            backdrop-filter: blur(3px);
            background: radial-gradient(ellipse at center, rgba(10, 5, 25, 0.5) 0%, rgba(0, 0, 0, 0) 80%);
            padding: 1.8rem 1rem;
        }

        .theme-name {
            font-size: clamp(2rem, 8vw, 4.5rem);
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffe6f0, #d9b8ff, #b2a4ff, #ff99cc);
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmerText 12s ease infinite;
            text-shadow: 0 0 12px rgba(255, 105, 180, 0.4);
            font-family: 'Orbitron', 'Segoe UI', monospace;
        }

        .sub {
            font-size: clamp(0.8rem, 3vw, 1.1rem);
            color: #e0bbff;
            letter-spacing: 2px;
            margin-top: 12px;
            opacity: 0.8;
            font-weight: 300;
            text-transform: uppercase;
            backdrop-filter: blur(2px);
        }

        @keyframes shimmerText {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* tiny decorative nebula spark */
        .cosmic-credit {
            position: absolute;
            bottom: 18px;
            right: 22px;
            z-index: 12;
            font-size: 11px;
            color: rgba(210, 180, 255, 0.5);
            font-family: monospace;
            pointer-events: none;
            backdrop-filter: blur(4px);
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 40px;
            letter-spacing: 1px;
        }

        /* optional glow effect for blinking starts (just visual context) */
        @keyframes gentlePulse {
            0% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        /* for better responsive scaling */
        @media (max-width: 700px) {
            .theme-name {
                letter-spacing: 3px;
            }
        }
    </style>
</head>

<body>

    <div class="canvas-container">
        <canvas id="nebulaCanvas"></canvas>
    </div>

    <div class="theme-overlay">
        <div class="theme-name">✨ NEBULA HEART ✨</div>
        <div class="sub">midnight deep blue · violet indigo · deep pink nebula</div>
    </div>
    <div class="cosmic-credit">✦ stellar drift | eternal twilight ✦</div>

    <script>
        (function () {
            // --- Color Palette ---
            // Inspired by: midnight deep blue, thick violet indigo, deep pink that matches nebulas
            const COLORS = {
                deepBlue: [8, 10, 35],      // midnight deep base
                violetIndigo: [75, 45, 130], // rich indigo-violet
                deepPink: [210, 40, 110],    // radiant deep pink / magenta nebula tone
                nebulaGlow: [180, 70, 150],   // ethereal mix
                accentPurple: [110, 60, 170]
            };

            // Get canvas and context
            const canvas = document.getElementById('nebulaCanvas');
            let ctx = canvas.getContext('2d');

            let width, height;

            // noise offsets for fluid, slow-moving gradients / nebula flow
            let timeOffset = 0;
            let starField = [];      // dynamic stars + twinkling (blink here and there)
            let twinklePhases = [];

            // number of stars
            const STAR_COUNT = 650;

            // for additional organic nebula displacement
            let flowField = [];
            const FLOW_RES = 40;   // resolution for warp flow

            // initial setup
            function initStars() {
                starField = [];
                twinklePhases = [];
                for (let i = 0; i < STAR_COUNT; i++) {
                    starField.push({
                        x: Math.random(),
                        y: Math.random(),
                        radius: 0.8 + Math.random() * 2.2,
                        alphaBase: 0.2 + Math.random() * 0.7,
                        speedTwinkle: 0.3 + Math.random() * 1.5,
                        phaseShift: Math.random() * Math.PI * 2,
                        colorVariation: Math.random() > 0.7 ? 1 : 0 // few stars get subtle hue drift
                    });
                    twinklePhases.push(Math.random() * Math.PI * 2);
                }
            }

            // Initialize flow field (for subtle moving distortion)
            function initFlowField() {
                flowField = [];
                for (let i = 0; i <= FLOW_RES; i++) {
                    flowField[i] = [];
                    for (let j = 0; j <= FLOW_RES; j++) {
                        // angle based on pseudo-perlin style
                        let angleX = (i / FLOW_RES) * 6.28318;
                        let angleY = (j / FLOW_RES) * 5.0;
                        let angle = Math.sin(angleX) * Math.cos(angleY) * 1.5;
                        flowField[i][j] = { angle: angle, magnitude: 0.8 + Math.sin(i * 0.5) * 0.3 };
                    }
                }
            }

            // resize handler
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                // no need to reinit stars positions, but we keep relative mapping
            }

            // Helper: interpolate between two RGB colors (0-1 factor)
            function interpolateColor(color1, color2, t) {
                return [
                    color1[0] * (1 - t) + color2[0] * t,
                    color1[1] * (1 - t) + color2[1] * t,
                    color1[2] * (1 - t) + color2[2] * t
                ];
            }

            // Generate gradient background with slow morphing nebula layers
            // Using radial gradients + dynamic shifting to simulate moving cosmic clouds
            function drawNebulaBackground(timestamp) {
                if (!ctx) return;

                // time factor for ultra-slow drift (period ~ 80 sec for full cycle)
                const slowDrift = timestamp * 0.0006;
                const mediumDrift = timestamp * 0.0012;

                // 1. base solid fill: midnight deep blue with rich dark tone
                const gradBase = ctx.createLinearGradient(0, 0, width * 0.8, height);
                gradBase.addColorStop(0, `rgb(${COLORS.deepBlue[0]}, ${COLORS.deepBlue[1]}, ${COLORS.deepBlue[2]})`);
                gradBase.addColorStop(0.7, `rgb(${COLORS.violetIndigo[0]}, ${COLORS.violetIndigo[1]}, ${COLORS.violetIndigo[2]})`);
                gradBase.addColorStop(1, `rgb(25, 15, 55)`);
                ctx.fillStyle = gradBase;
                ctx.fillRect(0, 0, width, height);

                // 2. nebula-like organic clouds: multiple large radial gradients moving smoothly
                // first glowing core: deep pink nebula region
                const centerX1 = width * (0.4 + Math.sin(slowDrift * 0.7) * 0.12);
                const centerY1 = height * (0.5 + Math.cos(slowDrift * 0.5) * 0.08);
                const rad1 = Math.min(width, height) * 0.55;
                const grad1 = ctx.createRadialGradient(centerX1, centerY1, rad1 * 0.2, centerX1, centerY1, rad1);
                grad1.addColorStop(0, `rgba(${COLORS.deepPink[0]}, ${COLORS.deepPink[1]}, ${COLORS.deepPink[2]}, 0.55)`);
                grad1.addColorStop(0.45, `rgba(${COLORS.violetIndigo[0]}, ${COLORS.violetIndigo[1]}, ${COLORS.violetIndigo[2]}, 0.45)`);
                grad1.addColorStop(0.8, `rgba(${COLORS.deepBlue[0]}, ${COLORS.deepBlue[1]}, ${COLORS.deepBlue[2]}, 0.3)`);
                grad1.addColorStop(1, 'rgba(10, 5, 30, 0)');
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = grad1;
                ctx.fillRect(0, 0, width, height);

                // second nebula swirl: violet-indigo to deep pink moving opposite direction
                const centerX2 = width * (0.7 + Math.sin(mediumDrift * 0.4) * 0.1);
                const centerY2 = height * (0.35 + Math.cos(mediumDrift * 0.6 + 2.0) * 0.12);
                const rad2 = Math.min(width, height) * 0.5;
                const grad2 = ctx.createRadialGradient(centerX2, centerY2, rad2 * 0.1, centerX2, centerY2, rad2);
                grad2.addColorStop(0, `rgba(${COLORS.deepPink[0] + 20}, ${COLORS.deepPink[1] - 10}, ${COLORS.deepPink[2] + 30}, 0.6)`);
                grad2.addColorStop(0.4, `rgba(${COLORS.violetIndigo[0] + 30}, ${COLORS.violetIndigo[1]}, ${COLORS.violetIndigo[2] + 20}, 0.55)`);
                grad2.addColorStop(0.85, `rgba(40, 25, 80, 0.35)`);
                grad2.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad2;
                ctx.fillRect(0, 0, width, height);

                // third wispy nebula cloud: rich magenta moving slowly in diagonal
                const centerX3 = width * (0.2 + Math.sin(slowDrift * 0.9) * 0.15);
                const centerY3 = height * (0.7 + Math.cos(slowDrift * 0.45 + 1.2) * 0.1);
                const rad3 = Math.min(width, height) * 0.65;
                const grad3 = ctx.createRadialGradient(centerX3, centerY3, rad3 * 0.3, centerX3, centerY3, rad3);
                grad3.addColorStop(0, `rgba(210, 70, 150, 0.45)`);
                grad3.addColorStop(0.5, `rgba(115, 55, 155, 0.4)`);
                grad3.addColorStop(1, 'rgba(18, 12, 48, 0)');
                ctx.fillStyle = grad3;
                ctx.fillRect(0, 0, width, height);

                // reset composite for star layer (we'll draw stars normally)
                ctx.globalCompositeOperation = 'source-over';

                // extra soft glow using blurred "airbrush" effect: add a light mist
                ctx.globalAlpha = 0.35;
                const mistGrad = ctx.createLinearGradient(0, height * 0.3, width, height * 0.8);
                mistGrad.addColorStop(0, `rgba(145, 80, 180, 0.2)`);
                mistGrad.addColorStop(1, `rgba(75, 40, 110, 0.25)`);
                ctx.fillStyle = mistGrad;
                ctx.fillRect(0, 0, width, height);
                ctx.globalAlpha = 1.0;

                // --- subtle noise grain (optional filmic texture) ---
                // very light grain, adds depth but not intrusive
                ctx.globalCompositeOperation = 'overlay';
                ctx.globalAlpha = 0.07;
                for (let i = 0; i < 180; i++) {
                    ctx.fillStyle = `rgba(255,200,220,${Math.random() * 0.25})`;
                    ctx.fillRect(Math.random() * width, Math.random() * height, 1.5, 1.5);
                }
                ctx.globalAlpha = 1.0;
                ctx.globalCompositeOperation = 'source-over';
            }

            // draw twinkling stars with "blink here and there" effect
            // stars also drift extremely slowly for organic feel
            function drawStars(timestamp) {
                if (!ctx) return;
                const timeSec = timestamp * 0.001;

                for (let i = 0; i < starField.length; i++) {
                    const s = starField[i];
                    // very subtle motion for stars (barely perceptible drift)
                    const driftX = Math.sin(timeSec * 0.05 + s.y * 8) * 0.003;
                    const driftY = Math.cos(timeSec * 0.07 + s.x * 7) * 0.002;
                    let starX = (s.x + driftX) * width;
                    let starY = (s.y + driftY) * height;
                    // wrap around edges to keep infinite feel
                    if (starX < 0) starX += width;
                    if (starX > width) starX -= width;
                    if (starY < 0) starY += height;
                    if (starY > height) starY -= height;

                    // Twinkling effect: using sine wave to vary alpha, creates "blink here and there"
                    // Each star blinks at different rate, some more dramatic
                    let twinkleFactor = 0.6 + 0.45 * Math.sin(timeSec * s.speedTwinkle + s.phaseShift);
                    // extra random rapid blink simulation (optional micro flicker)
                    const microFlicker = Math.sin(timeSec * 8.2 * s.speedTwinkle) * 0.15;
                    let alpha = s.alphaBase * (twinkleFactor + microFlicker);
                    alpha = Math.min(0.95, Math.max(0.18, alpha));

                    // star color: mostly white with faint pink/blue depending on colorVariation
                    let r = 255, g = 235, b = 245;
                    if (s.colorVariation === 1) {
                        r = 255; g = 190 + Math.sin(s.phaseShift) * 30; b = 210 + Math.cos(s.phaseShift) * 30;
                    } else if (s.colorVariation === 0 && s.radius > 1.5) {
                        // larger stars slightly warmer
                        r = 255; g = 215; b = 245;
                    }

                    ctx.beginPath();
                    ctx.arc(starX, starY, s.radius * (0.7 + twinkleFactor * 0.4), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha * 0.9})`;
                    ctx.fill();

                    // additional glow for brighter stars (tiny bloom)
                    if (s.radius > 1.3 && twinkleFactor > 0.7) {
                        ctx.beginPath();
                        ctx.arc(starX, starY, s.radius * 1.5, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 180, 220, ${alpha * 0.25})`;
                        ctx.fill();
                    }
                }
            }

            // extra "blink" effect: occasional larger star flashes (blink here and there)
            // use random intervals to simulate sudden cosmic sparkle
            let lastBlinkTimestamp = 0;
            let activeBlinks = [];

            function updateRandomBlinks(nowMs) {
                // add new blink occasionally (every 0.8 to 3 seconds)
                if (activeBlinks.length < 12 && (nowMs - lastBlinkTimestamp) > (600 + Math.random() * 1800)) {
                    lastBlinkTimestamp = nowMs;
                    const randIdx = Math.floor(Math.random() * starField.length);
                    const star = starField[randIdx];
                    if (star) {
                        activeBlinks.push({
                            starIdx: randIdx,
                            intensity: 1.0,
                            life: 1.0,     // starts max, decays
                            decayRate: 0.03 + Math.random() * 0.045,
                            extraGlow: true
                        });
                    }
                }

                // update existing blinks & remove dead ones
                for (let i = activeBlinks.length - 1; i >= 0; i--) {
                    activeBlinks[i].life -= activeBlinks[i].decayRate;
                    if (activeBlinks[i].life <= 0) {
                        activeBlinks.splice(i, 1);
                    } else {
                        activeBlinks[i].intensity = activeBlinks[i].life;
                    }
                }
            }

            function drawBlinkingStars(nowMs, timestampSec) {
                if (!ctx) return;
                for (let blink of activeBlinks) {
                    const starData = starField[blink.starIdx];
                    if (!starData) continue;
                    // compute position with same drift as stars
                    const driftX = Math.sin(timestampSec * 0.05 + starData.y * 8) * 0.003;
                    const driftY = Math.cos(timestampSec * 0.07 + starData.x * 7) * 0.002;
                    let starX = (starData.x + driftX) * width;
                    let starY = (starData.y + driftY) * height;
                    if (starX < 0) starX += width;
                    if (starX > width) starX -= width;
                    if (starY < 0) starY += height;
                    if (starY > height) starY -= height;

                    const rad = starData.radius * (1.2 + blink.intensity * 1.0);
                    const glowIntensity = blink.intensity * 0.7;
                    ctx.beginPath();
                    ctx.arc(starX, starY, rad, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 140, 210, ${0.7 + blink.intensity * 0.5})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(starX, starY, rad * 1.8, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 100, 170, ${glowIntensity * 0.6})`;
                    ctx.fill();
                    // secondary core
                    ctx.beginPath();
                    ctx.arc(starX, starY, rad * 0.6, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 210, 240, 0.9)`;
                    ctx.fill();
                }
            }

            // add gentle aurora-like wisps using moving curves (optional)
            function drawMovingNebulaVeils(timestamp) {
                if (!ctx) return;
                const t = timestamp * 0.0009;
                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                ctx.globalAlpha = 0.15;
                for (let i = 0; i < 4; i++) {
                    ctx.beginPath();
                    const offsetX = width * (0.2 + Math.sin(t * 0.3 + i) * 0.1);
                    const offsetY = height * (0.6 + Math.cos(t * 0.5 + i * 1.2) * 0.12);
                    ctx.moveTo(offsetX, offsetY);
                    for (let x = 0; x <= width; x += 45) {
                        const y = offsetY + Math.sin(x * 0.003 + t * 1.2 + i) * 35 + Math.cos(x * 0.005 + t * 0.8) * 18;
                        ctx.lineTo(x, y);
                    }
                    ctx.lineTo(width, height);
                    ctx.lineTo(0, height);
                    ctx.closePath();
                    const grad = ctx.createLinearGradient(0, offsetY - 40, 0, offsetY + 80);
                    grad.addColorStop(0, `rgba(180, 70, 150, 0.2)`);
                    grad.addColorStop(1, `rgba(110, 40, 130, 0.05)`);
                    ctx.fillStyle = grad;
                    ctx.fill();
                }
                ctx.restore();
            }

            // main animation loop
            let animationId = null;
            let lastTimestamp = 0;

            function animate(now) {
                if (!ctx) return;
                // make sure canvas dimensions are up to date (but resize event also triggers)
                if (canvas.width !== width || canvas.height !== height) {
                    resizeCanvas();
                }

                const timestampMs = now;
                const timestampSec = timestampMs / 1000;

                // 1. draw deep nebulae & moving gradients (slow motion)
                drawNebulaBackground(timestampMs);

                // 2. draw stars (twinkling background)
                drawStars(timestampMs);

                // 3. dynamic random blinks (here and there)
                updateRandomBlinks(timestampMs);
                drawBlinkingStars(timestampMs, timestampSec);

                // 4. extra ultra subtle moving nebula wisps (enhances smooth transition)
                drawMovingNebulaVeils(timestampMs);

                // optional: final tiny mist for cohesion
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 0.12;
                ctx.fillStyle = 'rgba(20, 5, 45, 0.2)';
                ctx.fillRect(0, 0, width, height);
                ctx.globalAlpha = 1.0;

                requestAnimationFrame(animate);
            }

            // initial setup and event listeners
            function setup() {
                resizeCanvas();
                initStars();
                initFlowField();
                window.addEventListener('resize', () => {
                    resizeCanvas();
                    // optional reinit stars positions? keep relative, no need to reposition - it's fine
                });
                // start animation
                requestAnimationFrame(animate);
            }

            setup();
        })();
    </script>
</body>

</html>
