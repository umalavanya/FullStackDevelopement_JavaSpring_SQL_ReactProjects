<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rock Paper Scissors | Classic Arcade Duel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b2b3b 0%, #1a4a5f 100%);
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Game container — glowing glassmorphic panel */
        .game-container {
            max-width: 850px;
            width: 100%;
            background: rgba(22, 34, 48, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 68px;
            padding: 1.8rem 2rem 2.2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }

        /* Header & scoreboard */
        .score-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0e1c26c9;
            border-radius: 100px;
            padding: 0.8rem 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(4px);
            border: 1px solid #3e7b8f;
        }

        .score-card {
            text-align: center;
            background: #07161f;
            padding: 0.4rem 1.2rem;
            border-radius: 3rem;
            min-width: 110px;
            box-shadow: inset 0 1px 3px #00000033, 0 5px 10px rgba(0,0,0,0.2);
        }

        .score-label {
            font-weight: 600;
            letter-spacing: 1px;
            color: #b3e4f5;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 2.7rem;
            font-weight: 800;
            color: #f9e45b;
            line-height: 1;
            text-shadow: 0 2px 5px #00000050;
        }

        .vs-divider {
            font-size: 1.6rem;
            font-weight: 800;
            background: #f4c54230;
            padding: 0.2rem 1rem;
            border-radius: 3rem;
            color: #ffd966;
            backdrop-filter: blur(4px);
        }

        /* Result banner */
        .result-area {
            background: #05161eaa;
            border-radius: 60px;
            padding: 0.9rem;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.6rem;
            letter-spacing: 1px;
            color: #ffefc0;
            backdrop-filter: blur(8px);
            border: 1px solid #ffcd9440;
            transition: all 0.2s ease;
            min-height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }

        /* choices arena: player vs computer animated */
        .battle-arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .choice-box {
            flex: 1;
            background: #0a1b24aa;
            border-radius: 48px;
            padding: 1.2rem 0.5rem;
            text-align: center;
            backdrop-filter: blur(4px);
            border: 1px solid #3f8d9e;
            transition: transform 0.2s;
        }

        .choice-label {
            font-size: 1.1rem;
            font-weight: 600;
            color: #cae9ff;
            text-transform: uppercase;
            background: #00000050;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            margin-bottom: 1rem;
        }

        .choice-icon {
            font-size: 5rem;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.4));
            transition: all 0.2s ease;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .choice-icon span {
            background: #152d38;
            padding: 0.6rem 1.2rem;
            border-radius: 70px;
            font-size: 3.8rem;
            display: inline-block;
            box-shadow: inset 0 1px 3px #ffffff30, 0 8px 14px #00000040;
        }

        /* action buttons row */
        .buttons-row {
            display: flex;
            justify-content: center;
            gap: 1.4rem;
            flex-wrap: wrap;
            margin: 1.8rem 0 1.5rem;
        }

        .game-btn {
            background: #1f3e48;
            border: none;
            width: 110px;
            padding: 14px 0;
            font-size: 1.6rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 8px 0 #0a1a1f;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: monospace;
        }

        .game-btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #0a1a1f;
        }

        .btn-rock { background: #6e3b2c; box-shadow: 0 8px 0 #3e2018; }
        .btn-paper { background: #2d6a6f; box-shadow: 0 8px 0 #194146; }
        .btn-scissors { background: #5f4b6e; box-shadow: 0 8px 0 #352a3d; }

        .reset-btn {
            background: #2c3e3f;
            width: auto;
            padding: 12px 26px;
            font-size: 1.1rem;
            letter-spacing: 1px;
            box-shadow: 0 5px 0 #142126;
            font-weight: 600;
        }

        .game-btn:hover {
            filter: brightness(1.05);
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #0a1a1f;
        }
        .game-btn:active {
            transform: translateY(4px);
        }

        /* win/loss glow */
        .glow-effect {
            text-shadow: 0 0 8px #ffd966, 0 0 12px #ffb347;
        }

        /* round animation */
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-choice {
            animation: pop 0.25s ease-out;
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #6f9fb0;
            margin-top: 1.2rem;
        }

        @media (max-width: 600px) {
            .game-container { padding: 1rem; }
            .choice-icon span { font-size: 2.6rem; padding: 0.4rem 0.8rem; }
            .choice-icon { min-height: 80px; }
            .game-btn { width: 85px; font-size: 1.2rem; }
            .score-value { font-size: 2rem; }
            .result-area { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="score-panel">
        <div class="score-card">
            <div class="score-label">👤 YOU</div>
            <div class="score-value" id="playerScore">0</div>
        </div>
        <div class="vs-divider">⚔️ VS ⚔️</div>
        <div class="score-card">
            <div class="score-label">🤖 COM</div>
            <div class="score-value" id="computerScore">0</div>
        </div>
    </div>

    <div class="result-area" id="resultMessage">
        ✨ Choose your weapon ✨
    </div>

    <div class="battle-arena">
        <div class="choice-box">
            <div class="choice-label">YOUR MOVE</div>
            <div class="choice-icon" id="playerChoiceIcon">
                <span>❔</span>
            </div>
        </div>
        <div class="choice-box">
            <div class="choice-label">AI OPPONENT</div>
            <div class="choice-icon" id="computerChoiceIcon">
                <span>❔</span>
            </div>
        </div>
    </div>

    <div class="buttons-row">
        <button class="game-btn btn-rock" id="rockBtn">🪨 ROCK</button>
        <button class="game-btn btn-paper" id="paperBtn">📄 PAPER</button>
        <button class="game-btn btn-scissors" id="scissorsBtn">✂️ SCISSORS</button>
    </div>
    <div class="buttons-row">
        <button class="game-btn reset-btn" id="resetBtn">🔄 RESET GAME</button>
    </div>
    <footer>⚡ classic duel — first to highest spirit wins!</footer>
</div>

<script>
    (function(){
        // ---------- GAME STATE ----------
        let playerScore = 0;
        let computerScore = 0;
        let currentGameActive = true;   // always active, but reset stops rounds anyway
        let roundInProgress = false;      // prevent spam clicking during animation

        // DOM elements
        const playerScoreEl = document.getElementById('playerScore');
        const computerScoreEl = document.getElementById('computerScore');
        const resultMsgDiv = document.getElementById('resultMessage');
        const playerChoiceIconSpan = document.getElementById('playerChoiceIcon').querySelector('span');
        const computerChoiceIconSpan = document.getElementById('computerChoiceIcon').querySelector('span');

        // Buttons
        const rockBtn = document.getElementById('rockBtn');
        const paperBtn = document.getElementById('paperBtn');
        const scissorsBtn = document.getElementById('scissorsBtn');
        const resetBtn = document.getElementById('resetBtn');

        // Helper: get clean emoji + display name for moves
        function getMoveDisplay(move) {
            switch(move) {
                case 'rock': return { emoji: '🪨', name: 'ROCK' };
                case 'paper': return { emoji: '📄', name: 'PAPER' };
                case 'scissors': return { emoji: '✂️', name: 'SCISSORS' };
                default: return { emoji: '❔', name: '?' };
            }
        }

        // update visual icons in battle arena
        function updateChoiceIcons(playerMove, computerMove) {
            if (playerMove) {
                const pDisplay = getMoveDisplay(playerMove);
                playerChoiceIconSpan.innerHTML = `${pDisplay.emoji} ${pDisplay.name}`;
            } else {
                playerChoiceIconSpan.innerHTML = `❔ WAIT`;
            }
            if (computerMove) {
                const cDisplay = getMoveDisplay(computerMove);
                computerChoiceIconSpan.innerHTML = `${cDisplay.emoji} ${cDisplay.name}`;
            } else {
                computerChoiceIconSpan.innerHTML = `❔ ???`;
            }
        }

        // winner logic: returns 'player', 'computer', or 'tie'
        function determineWinner(player, computer) {
            if (player === computer) return 'tie';
            if (
                (player === 'rock' && computer === 'scissors') ||
                (player === 'scissors' && computer === 'paper') ||
                (player === 'paper' && computer === 'rock')
            ) {
                return 'player';
            }
            return 'computer';
        }

        // generate computer move
        function getComputerMove() {
            const moves = ['rock', 'paper', 'scissors'];
            const randomIndex = Math.floor(Math.random() * 3);
            return moves[randomIndex];
        }

        // update scoreboard UI
        function updateScoreUI() {
            playerScoreEl.innerText = playerScore;
            computerScoreEl.innerText = computerScore;
        }

        // show result message with flavor
        function setResultMessage(winner, playerMove, computerMove) {
            const playerDisplay = getMoveDisplay(playerMove);
            const computerDisplay = getMoveDisplay(computerMove);
            
            if (winner === 'tie') {
                resultMsgDiv.innerHTML = `🤝 TIE! Both chose ${playerDisplay.name}. No points awarded. 🤝`;
                resultMsgDiv.style.background = "#2c4b55aa";
                return;
            }
            
            if (winner === 'player') {
                resultMsgDiv.innerHTML = `🎉 YOU WIN! ${playerDisplay.name} beats ${computerDisplay.name}. +1 POINT! 🎉`;
                resultMsgDiv.style.background = "#1f6745aa";
                resultMsgDiv.style.border = "1px solid #b5ffb0";
            } else {
                resultMsgDiv.innerHTML = `💀 COMPUTER WINS! ${computerDisplay.name} beats ${playerDisplay.name}. Point lost... 💀`;
                resultMsgDiv.style.background = "#8b3c2daa";
                resultMsgDiv.style.border = "1px solid #ffa270";
            }
            
            // reset glow after short time? we keep but it's fine
            setTimeout(() => {
                if (resultMsgDiv) {
                    resultMsgDiv.style.background = "#05161eaa";
                    resultMsgDiv.style.border = "1px solid #ffcd9440";
                }
            }, 1000);
        }

        // core game logic after both moves are selected
        function playRound(playerMove) {
            if (roundInProgress) {
                // gentle feedback: already processing
                resultMsgDiv.innerHTML = "⏳ Hold on! The duel is resolving... ⏳";
                setTimeout(() => {
                    if(resultMsgDiv && !roundInProgress) return;
                    if(resultMsgDiv.innerText.includes("Hold on")) 
                        resultMsgDiv.innerHTML = "✨ Choose your weapon ✨";
                }, 800);
                return;
            }
            
            roundInProgress = true;
            
            // get computer move
            const computerMove = getComputerMove();
            
            // animate icons: quick effect
            playerChoiceIconSpan.classList.add('animate-choice');
            computerChoiceIconSpan.classList.add('animate-choice');
            setTimeout(() => {
                playerChoiceIconSpan.classList.remove('animate-choice');
                computerChoiceIconSpan.classList.remove('animate-choice');
            }, 260);
            
            // update visual icons immediately
            updateChoiceIcons(playerMove, computerMove);
            
            // determine winner
            const winner = determineWinner(playerMove, computerMove);
            
            // update scores
            if (winner === 'player') {
                playerScore++;
                updateScoreUI();
                setResultMessage('player', playerMove, computerMove);
                // extra celebration flash for scoreboard
                document.querySelector('.score-card:first-child').style.transform = "scale(1.02)";
                setTimeout(() => {
                    document.querySelector('.score-card:first-child').style.transform = "";
                }, 200);
            } 
            else if (winner === 'computer') {
                computerScore++;
                updateScoreUI();
                setResultMessage('computer', playerMove, computerMove);
                document.querySelector('.score-card:last-child').style.transform = "scale(1.02)";
                setTimeout(() => {
                    document.querySelector('.score-card:last-child').style.transform = "";
                }, 200);
            } 
            else {
                setResultMessage('tie', playerMove, computerMove);
                // tie flash neutral
                resultMsgDiv.style.background = "#3b5d62aa";
                setTimeout(() => {
                    if(resultMsgDiv) resultMsgDiv.style.background = "#05161eaa";
                }, 700);
            }
            
            // optional check for victory highlight (no max limit, but fun)
            if (playerScore >= 10) {
                resultMsgDiv.innerHTML = `🏆 LEGENDARY! You reached ${playerScore} points! Ultimate victory! 🏆<br>Click RESET for another duel.`;
                resultMsgDiv.style.background = "#ffb347aa";
                disableGameButtonsTemporarily(true);
                roundInProgress = false;
                return;
            } 
            if (computerScore >= 10) {
                resultMsgDiv.innerHTML = `🤖 MACHINE DOMINATION! Computer reached ${computerScore} points... RESET to continue. 🤖`;
                resultMsgDiv.style.background = "#b94b2caa";
                disableGameButtonsTemporarily(true);
                roundInProgress = false;
                return;
            }
            
            roundInProgress = false;
        }
        
        // Disable main action buttons after high score (soft lock until reset)
        function disableGameButtonsTemporarily(disabled) {
            const btns = [rockBtn, paperBtn, scissorsBtn];
            btns.forEach(btn => {
                if (disabled) {
                    btn.disabled = true;
                    btn.style.opacity = "0.6";
                    btn.style.cursor = "not-allowed";
                } else {
                    btn.disabled = false;
                    btn.style.opacity = "1";
                    btn.style.cursor = "pointer";
                }
            });
        }
        
        // Reset everything back to start
        function resetGame() {
            // prevent any ongoing round lock
            roundInProgress = false;
            playerScore = 0;
            computerScore = 0;
            updateScoreUI();
            
            // reset icons to question marks
            playerChoiceIconSpan.innerHTML = "❔";
            computerChoiceIconSpan.innerHTML = "❔";
            
            // reset message
            resultMsgDiv.innerHTML = "✨ Game reset! Make your move ✨";
            resultMsgDiv.style.background = "#05161eaa";
            resultMsgDiv.style.border = "1px solid #ffcd9440";
            
            // re-enable buttons if they were disabled
            disableGameButtonsTemporarily(false);
            
            // small bounce effect on reset
            const container = document.querySelector('.game-container');
            container.style.transform = "scale(0.99)";
            setTimeout(() => { container.style.transform = ""; }, 120);
        }
        
        // event handlers with anti-spam & round protection
        function handlePlayerMove(move) {
            if (roundInProgress) {
                resultMsgDiv.innerHTML = "⚡ Duel in progress... wait a moment ⚡";
                setTimeout(() => {
                    if(resultMsgDiv && !roundInProgress && !resultMsgDiv.innerHTML.includes("Duel in progress")) return;
                    if(resultMsgDiv.innerHTML.includes("Duel in progress"))
                        resultMsgDiv.innerHTML = "✨ Choose your weapon ✨";
                }, 900);
                return;
            }
            // extra safety if game buttons disabled due to high score
            if (rockBtn.disabled === true) {
                resultMsgDiv.innerHTML = "🏁 Game is frozen. Press RESET to start a new match! 🏁";
                return;
            }
            playRound(move);
        }
        
        // Attach event listeners
        rockBtn.addEventListener('click', () => handlePlayerMove('rock'));
        paperBtn.addEventListener('click', () => handlePlayerMove('paper'));
        scissorsBtn.addEventListener('click', () => handlePlayerMove('scissors'));
        resetBtn.addEventListener('click', () => resetGame());
        
        // initialize interface, set default icons
        updateChoiceIcons(null, null);
        updateScoreUI();
        
        // Keyboard support: press 1,2,3 or r,p,s for faster fun!
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'r' || key === '1') {
                e.preventDefault();
                handlePlayerMove('rock');
            } else if (key === 'p' || key === '2') {
                e.preventDefault();
                handlePlayerMove('paper');
            } else if (key === 's' || key === '3') {
                e.preventDefault();
                handlePlayerMove('scissors');
            } else if (key === ' ' || key === 'escape' || key === 'r' && e.ctrlKey === false && key === 'r' && resetBtn) {
                if(key === ' ' || key === 'escape') {
                    // optional: space resets? but reset is better with 'x'? Let's map 'x' for reset
                }
            }
            if(key === 'x' || key === 'delete') {
                resetGame();
            }
        });
        
        // bonus: instruction hint on console but not needed
        console.log("Rock Paper Scissors ready — keyboard: [R]ock, [P]aper, [S]cissors, [X] reset");
    })();
</script>
</body>
</html>
