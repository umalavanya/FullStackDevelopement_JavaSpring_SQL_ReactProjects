<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: rgb(18, 19, 28);
            font-family: Arial, sans-serif;
        }

        .container {
            border: 1px solid white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            background-color: rgb(30, 32, 40);
        }

        .display {
            width: 300px;
            background-color: rgb(240, 240, 245);
            border: 2px solid rgb(17, 17, 18);
            height: 100px;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            font-size: 2rem;
            text-align: right;
            line-height: 70px;
            overflow: hidden;
        }

        .key-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            padding: 10px;
        }

        .keys {
            border: 1px solid gray;
            height: 50px;
            background-color: rgb(14, 5, 46);
            color: white;
            text-align: center;
            line-height: 50px;
            border-radius: 5px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .keys:hover {
            background-color: rgb(40, 20, 100);
            transform: scale(1.02);
        }

        .keys:active {
            transform: scale(0.98);
        }

        .operator {
            background-color: rgb(100, 70, 150);
        }

        .equals {
            background-color: rgb(200, 100, 50);
        }

        .clear {
            background-color: rgb(150, 50, 50);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="display" id="display">0</div>

        <div class="key-container">
            <div class="keys clear" onclick="clearDisplay()">C</div>
            <div class="keys operator" onclick="appendToDisplay('/')">/</div>
            <div class="keys operator" onclick="appendToDisplay('*')">×</div>
            <div class="keys operator" onclick="appendToDisplay('-')">-</div>

            <div class="keys" onclick="appendToDisplay('7')">7</div>
            <div class="keys" onclick="appendToDisplay('8')">8</div>
            <div class="keys" onclick="appendToDisplay('9')">9</div>
            <div class="keys operator" onclick="appendToDisplay('+')">+</div>

            <div class="keys" onclick="appendToDisplay('4')">4</div>
            <div class="keys" onclick="appendToDisplay('5')">5</div>
            <div class="keys" onclick="appendToDisplay('6')">6</div>
            <div class="keys operator" onclick="appendToDisplay('%')"
                style="grid-row: span 2; height: 105px; line-height: 105px;">%</div>

            <div class="keys" onclick="appendToDisplay('1')">1</div>
            <div class="keys" onclick="appendToDisplay('2')">2</div>
            <div class="keys" onclick="appendToDisplay('3')">3</div>

            <div class="keys" onclick="appendToDisplay('0')" style="grid-column: span 2;">0</div>
            <div class="keys" onclick="appendToDisplay('.')">.</div>
            <div class="keys equals" onclick="calculate()">=</div>

            <div class="keys clear" onclick="backspace()" style="grid-column: span 2;">⌫</div>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let shouldResetDisplay = false;

        function appendToDisplay(value) {
            if (display.innerText === '0' || shouldResetDisplay) {
                display.innerText = value;
                shouldResetDisplay = false;
            } else {
                display.innerText += value;
            }
        }

        function clearDisplay() {
            display.innerText = '0';
        }

        function calculate() {
            try {
                // Replace × with * for evaluation
                let expression = display.innerText.replace('×', '*');
                let result = eval(expression);

                // Handle decimal results
                if (result.toString().includes('.')) {
                    result = Math.round(result * 1000000) / 1000000;
                }

                display.innerText = result;
                shouldResetDisplay = true;
            } catch (error) {
                display.innerText = 'Error';
                shouldResetDisplay = true;
            }
        }

        function backspace() {
            if (display.innerText.length > 1) {
                display.innerText = display.innerText.slice(0, -1);
            } else {
                display.innerText = '0';
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (event) => {
            const key = event.key;

            if (key >= '0' && key <= '9') {
                appendToDisplay(key);
            } else if (key === '.') {
                appendToDisplay('.');
            } else if (key === '+' || key === '-' || key === '*' || key === '/') {
                appendToDisplay(key);
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            } else if (key === 'Backspace') {
                backspace();
            } else if (key === 'Escape') {
                clearDisplay();
            }
        });
    </script>
</body>

</html>
