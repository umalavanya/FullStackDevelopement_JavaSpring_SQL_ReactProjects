<html>

<body>
    <div id="demo"> </div>
    <script>
        const output = document.getElementById("demo");
        var aProperty;
        output.innerHTML = "<h2 style='color:red'><u>Navigator Object Properties</u></h2><br> ";
        for (aProperty in navigator) {
            output.innerHTML += aProperty;
            output.innerHTML += "<br>";
        }
        output.innerHTML += "Exiting from the loop!";
      </script>
</body>

</html>
